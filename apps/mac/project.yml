# apps/mac/project.yml
name: StashBro
options:
  bundleIdPrefix: com.stashbro
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""  # Set to your Apple Developer Team ID

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    exactVersion: 6.29.3
  swift-openapi-generator:
    url: https://github.com/apple/swift-openapi-generator
    exactVersion: 1.13.0
  swift-openapi-runtime:
    url: https://github.com/apple/swift-openapi-runtime
    exactVersion: 1.12.0
  swift-openapi-urlsession:
    url: https://github.com/apple/swift-openapi-urlsession
    exactVersion: 1.3.1
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: 2.4.0

targets:
  StashBro:
    type: application
    platform: macOS
    sources:
      - path: StashBro
    resources:
      - StashBro/Assets.xcassets
      - StashBro/openapi.yaml
      - StashBro/openapi-generator-config.yaml
    info:
      path: StashBro/Info.plist
      properties:
        CFBundleName: StashBro
        CFBundleIdentifier: com.stashbro.app
        NSPrincipalClass: NSApplication
        LSUIElement: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSAppleEventsUsageDescription: "StashBro reads the current browser tab URL to save links."
        com.apple.security.application-groups:
          - group.com.stashbro.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stashbro.app
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - package: GRDB
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-openapi-urlsession
        product: OpenAPIURLSession
      - package: KeyboardShortcuts
      - target: StashBroShareExtension
        embed: true
        codeSign: true
      - target: StashBroSafariExtension
        embed: true
        codeSign: true
      - target: StashBroWidget
        embed: true
        codeSign: true
    buildToolPlugins:
      - package: swift-openapi-generator
        plugin: OpenAPIGenerator

  StashBroShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: StashBroShareExtension
    info:
      path: StashBroShareExtension/Info.plist
      properties:
        CFBundleIdentifier: com.stashbro.app.shareextension
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
        com.apple.security.application-groups:
          - group.com.stashbro.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stashbro.app.shareextension
        MACOSX_DEPLOYMENT_TARGET: "14.0"

  StashBroSafariExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: "StashBroSafariExtension/macOS (Extension)"
      - path: "StashBroSafariExtension/Shared (Extension)"
    info:
      path: "StashBroSafariExtension/macOS (Extension)/Info.plist"
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stashbro.app.extension
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    postBuildScripts:
      - name: Copy Web Extension Resources
        script: |
          set -e
          SRC="${SRCROOT}/../../packages/extension/.output/safari-mv2"
          DEST="${TARGET_BUILD_DIR}/${FULL_PRODUCT_NAME}/Contents/Resources"
          if [ ! -d "$SRC" ]; then
            echo "error: Safari extension build missing. Run: pnpm --filter @stashbro/extension build:safari" >&2
            exit 1
          fi
          mkdir -p "$DEST"
          cp -R "$SRC/" "$DEST/"

  StashBroWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: StashBroWidget
      - path: StashBro/DB/AppDatabase.swift
      - path: StashBro/DB/StashItem+DB.swift
      - path: StashBro/DB/Tag+DB.swift
    info:
      path: StashBroWidget/Info.plist
      properties:
        CFBundleIdentifier: com.stashbro.app.widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        com.apple.security.application-groups:
          - group.com.stashbro.app
    dependencies:
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stashbro.app.widget
        MACOSX_DEPLOYMENT_TARGET: "14.0"

  StashBroTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: StashBroTests
    dependencies:
      - target: StashBro
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stashbro.tests
        GENERATE_INFOPLIST_FILE: YES
